<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
        />

        <!-- ── SEO ── -->
        <title>Encore App — Concert Tracker & Social Feed</title>
        <meta
            name="description"
            content="Track your concerts, follow friends, scan Gmail for tickets, and discover shows by genre. The social concert tracker app."
        />
        <meta name="robots" content="noindex, follow" />
        <link rel="canonical" href="https://encorefriends.com/app.html" />

        <!-- ── Open Graph ── -->
        <meta property="og:title" content="Encore — Concert Tracker App" />
        <meta
            property="og:description"
            content="Scan tickets, follow friends, never miss a show."
        />
        <meta
            property="og:image"
            content="https://encorefriends.com/og-image.jpg"
        />
        <meta property="og:url" content="https://encorefriends.com/app.html" />
        <meta property="og:type" content="website" />

        <!-- ── PWA Web App Meta ── -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Encore" />
        <meta name="theme-color" content="#070707" />
        <link rel="manifest" href="manifest.json" />
        <link
            rel="privacy-policy"
            href="https://encorefriends.com/privacy.html"
        />

        <!-- ── Fonts ── -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- ── App Stylesheet ── -->
        <link rel="stylesheet" href="css/app.css" />

        <!-- ── Supabase + Google GSI + React + Babel (CDN) — order matters ── -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script
            src="https://accounts.google.com/gsi/client"
            async
            defer
        ></script>
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <!-- ── Base styles only ── -->
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body,
            #root {
                height: 100%;
                min-height: 100vh;
            }
            body {
                background: #080808;
                color: #f0ede8;
                font-family: "Syne", sans-serif;
                overflow-x: hidden;
                -webkit-font-smoothing: antialiased;
            }
            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
            ::-webkit-scrollbar-thumb {
                background: #2a2a2a;
                border-radius: 2px;
            }
        </style>

        <!-- ── Favicon ── -->
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="text/babel" src="js/app.js"></script>
    </body>
</html>
